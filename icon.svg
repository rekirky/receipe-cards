<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">

<defs>
  <clipPath id="recipeClip2">
    <rect x="0" y="0" width="300" height="300" rx="60" ry="60"/>
  </clipPath>
</defs>

<rect x="0" y="0" width="300" height="300" rx="60" ry="60" fill="#0a0a0a"/>

<g clip-path="url(#recipeClip2)">

  <!-- Colourful blob accents -->
  <circle cx="270" cy="35" r="80" fill="#f97316" opacity="0.15"/>
  <circle cx="20" cy="280" r="90" fill="#a855f7" opacity="0.12"/>
  <circle cx="30" cy="60" r="60" fill="#ec4899" opacity="0.1"/>

  <!-- Back card - tilted left -->
  <g transform="rotate(-12, 150, 150)">
    <rect x="40" y="35" width="160" height="210" rx="14" fill="#1a1a1a" stroke="#f97316" stroke-width="2"/>
    <rect x="58" y="70" width="90" height="7" rx="3" fill="#f97316" opacity="0.7"/>
    <rect x="58" y="85" width="70" height="7" rx="3" fill="#f97316" opacity="0.4"/>
    <rect x="58" y="100" width="110" height="7" rx="3" fill="#f97316" opacity="0.4"/>
    <ellipse cx="120" cy="52" rx="18" ry="10" fill="#f97316" opacity="0.6"/>
    <rect x="110" y="43" width="20" height="12" rx="4" fill="#f97316" opacity="0.6"/>
  </g>

  <!-- Middle card - tilted right -->
  <g transform="rotate(8, 150, 150)">
    <rect x="48" y="28" width="160" height="210" rx="14" fill="#1a1a1a" stroke="#ec4899" stroke-width="2"/>
    <rect x="66" y="65" width="80" height="7" rx="3" fill="#ec4899" opacity="0.7"/>
    <rect x="66" y="80" width="100" height="7" rx="3" fill="#ec4899" opacity="0.4"/>
    <rect x="66" y="95" width="60" height="7" rx="3" fill="#ec4899" opacity="0.4"/>
  </g>

  <!-- Front card -->
  <rect x="62" y="22" width="168" height="218" rx="14" fill="#141414" stroke="#ffffff" stroke-width="2.5"/>

  <!-- Yellow banner -->
  <rect x="62" y="22" width="168" height="48" rx="14" fill="#facc15"/>
  <rect x="62" y="48" width="168" height="22" rx="0" fill="#facc15"/>

  <!-- Fork -->
  <line x1="126" y1="32" x2="126" y2="62" stroke="#0a0a0a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="121" y1="32" x2="121" y2="44" stroke="#0a0a0a" stroke-width="2" stroke-linecap="round"/>
  <line x1="131" y1="32" x2="131" y2="44" stroke="#0a0a0a" stroke-width="2" stroke-linecap="round"/>
  <path d="M121,44 Q126,50 131,44" fill="none" stroke="#0a0a0a" stroke-width="2"/>
  <!-- Knife -->
  <line x1="146" y1="32" x2="146" y2="62" stroke="#0a0a0a" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M146,32 Q156,38 146,50" fill="#0a0a0a"/>

  <!-- Smiley -->
  <circle cx="206" cy="42" r="9" fill="#0a0a0a" opacity="0.2"/>
  <circle cx="203" cy="40" r="1.5" fill="#0a0a0a"/>
  <circle cx="209" cy="40" r="1.5" fill="#0a0a0a"/>
  <path d="M202,44 Q206,48 210,44" fill="none" stroke="#0a0a0a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Recipe title -->
  <rect x="78" y="84" width="105" height="10" rx="5" fill="#ffffff" opacity="0.95"/>

  <!-- Ingredient lines -->
  <circle cx="80" cy="106" r="4" fill="#f97316"/>
  <rect x="90" y="102" width="88" height="7" rx="3" fill="#ffffff" opacity="0.6"/>

  <circle cx="80" cy="122" r="4" fill="#ec4899"/>
  <rect x="90" y="118" width="100" height="7" rx="3" fill="#ffffff" opacity="0.6"/>

  <circle cx="80" cy="138" r="4" fill="#a855f7"/>
  <rect x="90" y="134" width="72" height="7" rx="3" fill="#ffffff" opacity="0.6"/>

  <circle cx="80" cy="154" r="4" fill="#34d399"/>
  <rect x="90" y="150" width="95" height="7" rx="3" fill="#ffffff" opacity="0.6"/>

  <circle cx="80" cy="170" r="4" fill="#38bdf8"/>
  <rect x="90" y="166" width="80" height="7" rx="3" fill="#ffffff" opacity="0.6"/>

  <!-- Divider -->
  <line x1="74" y1="186" x2="218" y2="186" stroke="#ffffff" stroke-width="1" stroke-opacity="0.15"/>

  <!-- Clock -->
  <circle cx="90" cy="202" r="9" fill="none" stroke="#facc15" stroke-width="1.8"/>
  <line x1="90" y1="196" x2="90" y2="202" stroke="#facc15" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="90" y1="202" x2="95" y2="205" stroke="#facc15" stroke-width="1.8" stroke-linecap="round"/>

  <rect x="110" y="196" width="32" height="12" rx="6" fill="#f97316" opacity="0.9"/>
  <rect x="150" y="196" width="32" height="12" rx="6" fill="#ec4899" opacity="0.9"/>

  <!-- Chilli top left -->
  <ellipse cx="25" cy="75" rx="7" ry="18" fill="#ef4444" opacity="0.85" transform="rotate(30 25 75)"/>
  <line x1="27" y1="58" x2="30" y2="50" stroke="#16a34a" stroke-width="3" stroke-linecap="round" transform="rotate(30 25 75)"/>

  <!-- Star sparkle top right -->
  <line x1="264" y1="50" x2="264" y2="38" stroke="#facc15" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="258" y1="44" x2="270" y2="44" stroke="#facc15" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="260" y1="40" x2="268" y2="48" stroke="#facc15" stroke-width="2" stroke-linecap="round"/>
  <line x1="268" y1="40" x2="260" y2="48" stroke="#facc15" stroke-width="2" stroke-linecap="round"/>

  <!-- Swirl bottom right -->
  <path d="M255,250 Q270,235 260,220 Q250,205 265,195" fill="none" stroke="#a855f7" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- Scattered dots -->
  <circle cx="270" cy="160" r="4" fill="#ec4899" opacity="0.6"/>
  <circle cx="278" cy="180" r="3" fill="#facc15" opacity="0.6"/>
  <circle cx="265" cy="195" r="2.5" fill="#34d399" opacity="0.6"/>
  <circle cx="20" cy="180" r="3.5" fill="#38bdf8" opacity="0.5"/>
  <circle cx="15" cy="205" r="2.5" fill="#f97316" opacity="0.5"/>

</g>

</svg>
