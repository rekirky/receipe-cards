server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Don't cache the HTML entry point — always check for updates
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Vite asset files have content hashes in their filenames — safe to cache long-term
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: any path that doesn't match a real file serves index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
